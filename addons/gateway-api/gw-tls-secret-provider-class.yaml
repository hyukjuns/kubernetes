apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: devhyukjun-tls
  namespace: gw-share
spec:
  provider: azure
  secretObjects:                        # k8s Secret 자동 생성
  - secretName: devhyukjun-tls-secret
    type: kubernetes.io/tls
    data:
    - objectName: devhyukjun-tls-cert
      key: tls.crt
    - objectName: devhyukjun-tls-key
      key: tls.key
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""  # addon identity client id
    keyvaultName: devhyukjunkv
    tenantId: ""
    objects: |
      array:
        - |
          objectName: devhyukjun-tls-cert
          objectType: secret
        - |
          objectName: devhyukjun-tls-key
          objectType: secret
---
# dummy pod
# Secret 동기화를 위한 더미 Pod (또는 실제 앱 Pod에 추가)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tls-secret-sync-dummy
  namespace: gw-share
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tls-secret-sync
  template:
    metadata:
      labels:
        app: tls-secret-sync
    spec:
      containers:
      - name: sync
        image: alpine
        command: ["sleep", "infinity"]
        volumeMounts:
        - name: tls-secret-vol
          mountPath: /mnt/tls
          readOnly: true
      volumes:
      - name: tls-secret-vol
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: devhyukjun-tls