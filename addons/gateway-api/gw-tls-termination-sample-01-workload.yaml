# Workload for gw-tls-termination-sample-01.yaml
#
# Prerequisites — create a TLS secret in the Gateway namespace (gw-share):
#   # Self-signed cert for testing:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=secure.devhyukjun.info" \
#     -addext "subjectAltName=DNS:secure.devhyukjun.info"
#
#   kubectl create secret tls devhyukjun-tls-secret \
#     --cert=tls.crt --key=tls.key -n gw-share
#
# Apply:
#   kubectl apply -f gw-tls-termination-sample-01-workload.yaml
#   kubectl apply -f gw-tls-termination-sample-01.yaml
#
# Test:
#   curl -k https://secure.devhyukjun.info/api
#   curl -v http://secure.devhyukjun.info/ver  # should 301 → https

apiVersion: v1
kind: ConfigMap
metadata:
  name: api-service-nginx-config
  namespace: demo
data:
  default.conf: |
    server {
      listen 80;
      location / {
        add_header Content-Type text/plain;
        return 200 "Hello from api-service! path=$request_uri host=$hostname\n";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
      - name: api-service
        image: nginx:latest
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: "128Mi"
            cpu: "50m"
          requests:
            memory: "64Mi"
            cpu: "20m"
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config
        configMap:
          name: api-service-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: demo
spec:
  selector:
    app: api-service
  ports:
  - port: 8080
    targetPort: 80
