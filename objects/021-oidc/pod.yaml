apiVersion: v1
kind: Pod
metadata:
    name: sample-workload-identity-key-vault
    namespace: default
    labels:
        azure.workload.identity/use: "true"
spec:
    serviceAccountName: sa-umi-oidc-dev-hyukjun
    containers:
      - image: ghcr.io/azure/azure-workload-identity/msal-go
        name: oidc
        env:
          - name: KEYVAULT_URL
            value: ""
          - name: SECRET_NAME
            value: ""
    nodeSelector:
        kubernetes.io/os: linux