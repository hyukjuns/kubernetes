# bar app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test-local
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-test-local
  template:
    metadata:
      labels:
        app: nginx-test-local
    spec:
      containers:
      - name: nginx-test-local
        image: nginx:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args: ["-c", "echo \"nginx local \nHello from $(hostname)!\" > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
        resources:
          limits:
            memory: "128Mi"
            cpu: "50m"
          requests:
            memory: "128Mi"
            cpu: "50m"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-test-local
  namespace: test
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-internal-subnet: "sn-internal-lb"
spec: 
  externalTrafficPolicy: Local
  type: LoadBalancer
  selector:
    app: nginx-test-local
  ports:
    - name: nginx-test-local
      port: 80
      targetPort: 80
      protocol: TCP
